<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9CA3AF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D1D5DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E5E7EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B7280;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9CA3AF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="3"/>
  
  <!-- Inner decorative ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#textGrad)" stroke-width="1.5" opacity="0.3"/>
  
  <!-- ENVY Text -->
  <text x="100" y="115" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="800" fill="url(#textGrad)" text-anchor="middle" letter-spacing="6" filter="url(#glow)">ENVY</text>
  
  <!-- Decorative line under text -->
  <line x1="50" y1="135" x2="150" y2="135" stroke="url(#textGrad)" stroke-width="2" opacity="0.5"/>
  
  <!-- Small diamond at top -->
  <polygon points="100,15 108,30 100,45 92,30" fill="url(#textGrad)" opacity="0.7"/>
  
  <!-- Small diamond at bottom -->
  <polygon points="100,165 108,180 100,195 92,180" fill="url(#textGrad)" opacity="0.4"/>
</svg>
