                    <span>Journal</span>

                <a href="planner.html" class="nav-link">

                    </svg>
                    <span>Planner</span>
                </a>

            <!-- Search -->

            </button>
            
            <!-- Notifications -->
            <button class="header-icon-btn" id="headerNotificationBtn" aria-label="Notifications">

                    <path d="M12 22C13.1 22 14 21.1 14 20H10C10 21.1 10.9 22 12 22ZM18 16V11C18 7.93 16.36 5.36 13.5 4.68V4C13.5 3.17 12.83 2.5 12 2.5C11.17 2.5 10.5 3.17 10.5 4V4.68C7.63 5.36 6 7.92 6 11V16L4 18V19H20V18L18 16Z" stroke="currentColor" stroke-width="2"/>

            <!-- User Menu -->
            <div class="user-menu-wrapper">
                <button class="user-menu-btn" id="userMenuBtn">

                    <span class="user-name" id="headerUserName">User</span>

                        <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2"/>
                    </svg>

                <div class="user-dropdown glass-morphism" id="userDropdown" style="display: none;">
                    <div class="dropdown-header">
                        <div class="user-info">
                            <span class="dropdown-user-name" id="dropdownUserName">User</span>
                            <span class="dropdown-user-email" id="dropdownUserEmail">user@example.com</span>
                        </div>
                    </div>
                    <div class="dropdown-divider"></div>
                    <a href="settings.html" class="dropdown-item">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <path d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        Settings
                    </a>
                    <a href="#" class="dropdown-item" id="adminDropdownLink" style="display: none;">

                        </svg>
                        Admin Panel
                    </a>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item logout-btn" id="headerLogoutBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <path d="M9 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H9M16 17L21 12M21 12L16 7M21 12H9" stroke="currentColor" stroke-width="2"/>

            </div>
        </div>
    </div>
    
    <!-- Search Overlay -->
    <div class="search-overlay" id="searchOverlay" style="display: none;">
        <div class="search-container glass-morphism">
            <input type="text" class="search-input" id="globalSearchInput" placeholder="Search..." autocomplete="off">
            <div class="search-results" id="searchResults"></div>
        </div>
    </div>
</header>

<style>
.app-header {
    position: sticky;
    top: 28px;
    z-index: var(--z-sticky);
    border-bottom: 1px solid var(--glass-border);
}

.header-container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--spacing-md) var(--spacing-xl);
    max-width: 1400px;
    margin: 0 auto;
}

.header-left {
    display: flex;
    align-items: center;
    gap: var(--spacing-xl);
}

.mobile-menu-toggle {
    display: none;
    flex-direction: column;
    gap: 4px;
    background: transparent;
    border: none;
    cursor: pointer;
    padding: var(--spacing-xs);
}

.hamburger-line {
    width: 24px;
    height: 2px;
    background: var(--accent-secondary);
    border-radius: var(--radius-full);
    transition: all var(--transition-fast);
}

.brand {
    display: flex;
    align-items: center;
    gap: var(--spacing-md);
}

.brand-logo {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-md);
}

.brand-name {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-hover) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.header-nav {
    display: flex;
    gap: var(--spacing-xs);
}

.nav-link {
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
    padding: var(--spacing-sm) var(--spacing-lg);
    border-radius: var(--radius-full);
    color: var(--accent-muted);
    text-decoration: none;
    font-weight: 500;
    transition: all var(--transition-fast);
}

.nav-link:hover {
    color: var(--accent-hover);
    background: var(--glass-bg);
}

.nav-link.active {
    background: var(--accent-primary);
    color: var(--bg-primary);
}

.header-right {
    display: flex;
    align-items: center;
    gap: var(--spacing-md);
}

.header-icon-btn {
    position: relative;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    color: var(--accent-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition-fast);
}

.header-icon-btn:hover {
    border-color: var(--accent-primary);
    color: var(--accent-hover);
}

.user-menu-wrapper {
    position: relative;
}

.user-menu-btn {
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
    padding: var(--spacing-sm) var(--spacing-md);
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-full);
    color: var(--accent-secondary);
    cursor: pointer;
    transition: all var(--transition-fast);
}

.user-menu-btn:hover {
    border-color: var(--accent-primary);
}

.user-avatar-small {
    width: 28px;
    height: 28px;
    border-radius: 50%;
}

.user-dropdown {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    min-width: 220px;
    border-radius: var(--radius-xl);
    overflow: hidden;
    z-index: var(--z-dropdown);
}

.dropdown-header {
    padding: var(--spacing-md) var(--spacing-lg);
}

.dropdown-user-name {
    font-weight: 600;
    color: var(--accent-hover);
}

.dropdown-user-email {
    font-size: 12px;
    color: var(--accent-muted);
}

.dropdown-divider {
    height: 1px;
    background: var(--glass-border);
    margin: var(--spacing-xs) 0;
}

.dropdown-item {
    display: flex;
    align-items: center;
    gap: var(--spacing-md);
    padding: var(--spacing-md) var(--spacing-lg);
    color: var(--accent-secondary);
    text-decoration: none;
    transition: background var(--transition-fast);
    cursor: pointer;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    font-size: 14px;
}

.dropdown-item:hover {
    background: var(--glass-bg);
    color: var(--accent-hover);
}

.logout-btn {
    color: var(--error) !important;
}

.logout-btn:hover {
    background: rgba(239, 68, 68, 0.1) !important;
}

.search-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(8px);
    z-index: var(--z-modal);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 100px;
}

.search-container {
    width: 90%;
    max-width: 600px;
    border-radius: var(--radius-2xl);
    overflow: hidden;
}

.search-input {
    width: 100%;
    padding: var(--spacing-xl);
    background: transparent;
    border: none;
    color: var(--accent-hover);
    font-size: 20px;
    outline: none;
}

.search-input::placeholder {
    color: var(--accent-muted);
}

.search-results {
    max-height: 400px;
    overflow-y: auto;
    border-top: 1px solid var(--glass-border);
}

@media (max-width: 768px) {
    .mobile-menu-toggle {
        display: flex;
    }
    
    .header-nav {
        display: none;
    }
    
    .brand-name {
        display: none;
    }
    
    .header-container {
        padding: var(--spacing-md);
    }
    
    .user-menu-btn span:not(.user-avatar-small) {
        display: none;
    }
}
</style>

<script>
(function() {
    // Toggle user dropdown
    const userMenuBtn = document.getElementById('userMenuBtn');
    const userDropdown = document.getElementById('userDropdown');
    
    if (userMenuBtn && userDropdown) {
        userMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            userDropdown.style.display = userDropdown.style.display === 'none' ? 'block' : 'none';
        });
        
        document.addEventListener('click', () => {
            userDropdown.style.display = 'none';
        });
    }
    
    // Search overlay
    const searchBtn = document.getElementById('searchBtn');
    const searchOverlay = document.getElementById('searchOverlay');
    
    if (searchBtn && searchOverlay) {
        searchBtn.addEventListener('click', () => {
            searchOverlay.style.display = 'flex';
            document.getElementById('globalSearchInput').focus();
        });
        
        searchOverlay.addEventListener('click', (e) => {
            if (e.target === searchOverlay) {
                searchOverlay.style.display = 'none';
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && searchOverlay.style.display === 'flex') {
                searchOverlay.style.display = 'none';
            }
            
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                searchOverlay.style.display = 'flex';
                document.getElementById('globalSearchInput').focus();
            }
        });
    }
    
    // Mobile menu
    const mobileToggle = document.getElementById('mobileMenuToggle');
    if (mobileToggle) {
        mobileToggle.addEventListener('click', () => {
            const sidebar = document.getElementById('sidebar');
            if (sidebar) {
                sidebar.classList.toggle('mobile-open');
            }
        });
    }
    
    // Logout
    const logoutBtn = document.getElementById('headerLogoutBtn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', async () => {
            const { supabase } = await import('../js/supabase-client.js');
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        });
    }
})();
</script>
