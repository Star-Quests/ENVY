<!-- Sidebar Component -->
<aside class="sidebar-component glass-morphism" id="sidebarComponent">
    <div class="sidebar-inner">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <img src="assets/icons/envy-emblem.svg" alt="ENVY" class="sidebar-emblem pulse-glow">
                <span class="sidebar-brand-text">ENVY</span>
            </div>
            <button class="sidebar-collapse-btn" id="sidebarCollapseBtn" aria-label="Toggle Sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2"/>
                </svg>
            </button>
        </div>
        
        <nav class="sidebar-menu">
            <a href="dashboard.html" class="sidebar-item" data-tooltip="Dashboard">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M3 12L5 10M5 10L12 3L19 10M5 10V20H9V14H15V20H19V10M19 10L21 12" stroke="currentColor" stroke-width="2"/>
                </svg>
                <span>Dashboard</span>
            </a>
            <a href="journal.html" class="sidebar-item" data-tooltip="Journal">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M12 8V12L15 15M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" stroke="currentColor" stroke-width="2"/>
                </svg>
                <span>Journal</span>
            </a>
            <a href="planner.html" class="sidebar-item" data-tooltip="Planner">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M9 7H7V9H9V7Z M13 7H11V9H13V7Z M17 7H15V9H17V7Z M5 3H19C20.1046 3 21 3.89543 21 5V19C21 20.1046 20.1046 21 19 21H5C3.89543 21 3 20.1046 3 19V5C3 3.89543 3.89543 3 5 3Z" stroke="currentColor" stroke-width="2"/>
                </svg>
                <span>Planner</span>
            </a>
            <a href="settings.html" class="sidebar-item" data-tooltip="Settings">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z" stroke="currentColor" stroke-width="2"/>
                </svg>
                <span>Settings</span>
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <div class="sidebar-user">
                <img src="assets/icons/user-avatar.svg" alt="User" class="sidebar-avatar" id="sidebarAvatar">
                <div class="sidebar-user-info">
                    <span class="sidebar-user-name" id="sidebarUserName">User</span>
                    <span class="sidebar-user-role" id="sidebarUserRole">Trader</span>
                </div>
            </div>
            <button class="sidebar-logout" id="sidebarLogoutBtn" data-tooltip="Logout">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M9 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H9M16 17L21 12M21 12L16 7M21 12H9" stroke="currentColor" stroke-width="2"/>
                </svg>
                <span>Logout</span>
            </button>
        </div>
    </div>
</aside>

<style>
.sidebar-component {
    position: fixed;
    left: 0;
    top: 28px;
    bottom: 0;
    width: 280px;
    border-right: 1px solid var(--glass-border);
    transition: width var(--transition-base);
    z-index: var(--z-fixed);
}

.sidebar-component.collapsed {
    width: 80px;
}

.sidebar-inner {
    display: flex;
    flex-direction: column;
    height: 100%;
}

.sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--spacing-lg);
    border-bottom: 1px solid var(--glass-border);
}

.sidebar-brand {
    display: flex;
    align-items: center;
    gap: var(--spacing-md);
}

.sidebar-emblem {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-md);
}

.sidebar-brand-text {
    font-size: 20px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-hover) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    transition: opacity var(--transition-base);
}

.sidebar-component.collapsed .sidebar-brand-text {
    opacity: 0;
    display: none;
}

.sidebar-collapse-btn {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-md);
    background: transparent;
    border: 1px solid var(--glass-border);
    color: var(--accent-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition-fast);
}

.sidebar-collapse-btn:hover {
    border-color: var(--accent-primary);
    color: var(--accent-hover);
}

.sidebar-menu {
    flex: 1;
    padding: var(--spacing-lg) var(--spacing-md);
    display: flex;
    flex-direction: column;
    gap: var(--spacing-xs);
    overflow-y: auto;
}

.sidebar-item {
    display: flex;
    align-items: center;
    gap: var(--spacing-md);
    padding: var(--spacing-md) var(--spacing-lg);
    border-radius: var(--radius-lg);
    color: var(--accent-secondary);
    text-decoration: none;
    transition: all var(--transition-fast);
    position: relative;
}

.sidebar-item:hover {
    background: var(--glass-bg);
    color: var(--accent-hover);
}

.sidebar-item.active {
    background: var(--glass-bg);
    color: var(--accent-hover);
    box-shadow: inset 0 0 20px rgba(156, 163, 175, 0.1);
}

.sidebar-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 20px;
    background: var(--accent-primary);
    border-radius: var(--radius-full);
}

.sidebar-component.collapsed .sidebar-item span {
    display: none;
}

.sidebar-component.collapsed .sidebar-item {
    justify-content: center;
    padding: var(--spacing-md);
}

.sidebar-footer {
    padding: var(--spacing-lg);
    border-top: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.sidebar-user {
    display: flex;
    align-items: center;
    gap: var(--spacing-md);
}

.sidebar-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid var(--accent-primary);
}

.sidebar-user-info {
    display: flex;
    flex-direction: column;
}

.sidebar-component.collapsed .sidebar-user-info {
    display: none;
}

.sidebar-user-name {
    font-weight: 600;
    color: var(--accent-hover);
}

.sidebar-user-role {
    font-size: 12px;
    color: var(--accent-muted);
}

.sidebar-logout {
    display: flex;
    align-items: center;
    gap: var(--spacing-sm);
    padding: var(--spacing-sm) var(--spacing-md);
    background: transparent;
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-full);
    color: var(--error);
    cursor: pointer;
    transition: all var(--transition-fast);
}

.sidebar-component.collapsed .sidebar-logout span {
    display: none;
}

.sidebar-component.collapsed .sidebar-logout {
    padding: var(--spacing-sm);
}

.sidebar-logout:hover {
    background: rgba(239, 68, 68, 0.1);
    border-color: var(--error);
}

@media (max-width: 768px) {
    .sidebar-component {
        transform: translateX(-100%);
        transition: transform var(--transition-base);
    }
    
    .sidebar-component.mobile-open {
        transform: translateX(0);
    }
    
    .sidebar-component.collapsed {
        width: 280px;
    }
    
    .sidebar-component.collapsed .sidebar-brand-text,
    .sidebar-component.collapsed .sidebar-item span,
    .sidebar-component.collapsed .sidebar-user-info,
    .sidebar-component.collapsed .sidebar-logout span {
        display: block;
    }
}
</style>

<script>
(function() {
    const sidebar = document.getElementById('sidebarComponent');
    const collapseBtn = document.getElementById('sidebarCollapseBtn');
    
    if (collapseBtn && sidebar) {
        collapseBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
        });
        
        // Load saved state
        const savedState = localStorage.getItem('sidebarCollapsed');
        if (savedState === 'true') {
            sidebar.classList.add('collapsed');
        }
    }
    
    // Highlight current page
    const currentPage = window.location.pathname.split('/').pop();
    document.querySelectorAll('.sidebar-item').forEach(item => {
        const href = item.getAttribute('href');
        if (href && href.includes(currentPage)) {
            item.classList.add('active');
        }
    });
    
    // Logout
    const logoutBtn = document.getElementById('sidebarLogoutBtn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', async () => {
            const { supabase } = await import('../js/supabase-client.js');
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        });
    }
})();
</script>
